name: PyList Spotify Sync

on:
  schedule:
    - cron: '0 19 * * 3'  # mercoledì alle 19:00 UTC
    - cron: '0 19 * * 0'  # domenica alle 19:00 UTC
  workflow_dispatch:       # trigger manuale dalla UI di GitHub

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        run: python runner.py
        env:
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_STRING_SESSION: ${{ secrets.TELEGRAM_STRING_SESSION }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          SYNC_1_CHAT_ID: ${{ secrets.SYNC_1_CHAT_ID }}
          SYNC_1_PLAYLIST_ID: ${{ secrets.SYNC_1_PLAYLIST_ID }}
          SYNC_2_CHAT_ID: ${{ secrets.SYNC_2_CHAT_ID }}
          SYNC_2_PLAYLIST_ID: ${{ secrets.SYNC_2_PLAYLIST_ID }}
